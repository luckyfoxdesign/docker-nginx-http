services:
  nginx-s:
    build: .
    container_name: nginx-c
    restart: always
    volumes:
      - ./conf/${NGINX_CONF:-http-nginx.conf}:/etc/nginx/nginx.conf.template:ro
      - ./conf/snippets:/etc/nginx/snippets:ro
      - ./logs:/var/log/nginx
      - ./html:/var/www/certbot
      - ./certs:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    networks:
      - frontend_net
      - internal_net

  certbot:
    image: certbot/certbot
    container_name: certbot-c
    profiles: [https]
    volumes:
      - ./certs:/etc/letsencrypt
      - ./html:/var/www/certbot
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'
    restart: always

  # --- Пример подключения своего контейнера ---
  # my-app:
  #   image: my-app:latest
  #   container_name: my-app-c
  #   restart: always
  #   networks:
  #     - internal_net  # только внутренняя сеть — недоступен напрямую снаружи
  #   # НЕ добавляй ports: — доступ только через nginx

networks:
  frontend_net:
    driver: bridge
  internal_net:
    internal: true
